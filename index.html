<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Training Tracker</title>

<style>
body { font-family: Arial; background: #f1f3f6; padding: 20px; }
.container { background: #fff; padding: 25px; border-radius: 10px; max-width: 900px; margin: auto; }
select, input { padding: 10px; width: 100%; margin-bottom: 15px; }
.tracker { display: flex; justify-content: space-between; margin-top: 30px; }
.step { text-align: center; width: 100%; }
.circle { width: 40px; height: 40px; border-radius: 50%; background: #ccc; margin: auto; line-height: 40px; color: white; }
.completed .circle { background: #4caf50; }
.active .circle { background: #2874f0; }
</style>
</head>

<body>

<div class="container">
<h2>Training Tracker</h2>

<input type="text" id="username" placeholder="Enter Your Name">

<select id="stage">
<option value="0">Arrived</option>
<option value="1">Documentation</option>
<option value="2">OHC</option>
<option value="3">Safety</option>
<option value="4">DOJO</option>
<option value="5">Waiting</option>
<option value="6">Deployed</option>
</select>

<div class="tracker">
<div class="step"><div class="circle">1</div></div>
<div class="step"><div class="circle">2</div></div>
<div class="step"><div class="circle">3</div></div>
<div class="step"><div class="circle">4</div></div>
<div class="step"><div class="circle">5</div></div>
<div class="step"><div class="circle">6</div></div>
<div class="step"><div class="circle">7</div></div>
</div>
</div>

<script>
const username = document.getElementById("username");
const dropdown = document.getElementById("stage");

// 🔥 LOAD LAST USER + DATA
window.onload = function () {

    let lastUser = localStorage.getItem("lastUser");

    if (lastUser) {
        username.value = lastUser;
        loadUserData(lastUser);
    }
};

// 🔥 LOAD USER DATA
username.addEventListener("input", function () {
    let user = this.value.trim();
    if (user) {
        localStorage.setItem("lastUser", user);
        loadUserData(user);
    }
});

function loadUserData(user) {
    let saved = localStorage.getItem("user_" + user);

    if (saved === null) saved = 0;

    dropdown.value = saved;
    updateUI(saved);
}

// 🔥 SAVE DATA
dropdown.addEventListener("change", function () {

    let user = username.value.trim();

    if (!user) {
        alert("Enter name first");
        return;
    }

    let stage = this.value;

    localStorage.setItem("user_" + user, stage);
    localStorage.setItem("lastUser", user);

    updateUI(stage);
});

// UI UPDATE
function updateUI(stage) {
    let steps = document.querySelectorAll(".step");

    steps.forEach((step, index) => {
        step.classList.remove("completed", "active");

        if (index < stage) step.classList.add("completed");
        else if (index == stage) step.classList.add("active");
    });
}
</script>

</body>
</html>
