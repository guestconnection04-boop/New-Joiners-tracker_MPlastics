<script>
// 🔥 YOUR FIREBASE CONFIG (MUST BE CORRECT)
var firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com/", 
    projectId: "YOUR_PROJECT",
};

// INIT FIREBASE
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

let isLoaded = false;

// LOAD DATA FIRST
window.onload = function () {

    db.ref("training/stage").once("value").then(function(snapshot) {

        let stage = snapshot.val();

        if (stage === null) {
            stage = 0;
            db.ref("training/stage").set(0);
        }

        document.getElementById("stage").value = stage;
        updateUI(stage);

        isLoaded = true;

    });

    // REAL-TIME UPDATE (for others)
    db.ref("training/stage").on("value", function(snapshot) {

        let stage = snapshot.val();
        if (stage === null) return;

        document.getElementById("stage").value = stage;
        updateUI(stage);
    });
};

// UPDATE FROM DROPDOWN
function updateTracker() {
    if (!isLoaded) return;

    let stage = document.getElementById("stage").value;
    db.ref("training/stage").set(stage);
}

// UI UPDATE FUNCTION
function updateUI(stage) {

    let steps = document.querySelectorAll(".step");

    steps.forEach((step, index) => {
        step.classList.remove("completed", "active");

        if (index < stage) {
            step.classList.add("completed");
        } else if (index == stage) {
            step.classList.add("active");
        }
    });
}
</script>
